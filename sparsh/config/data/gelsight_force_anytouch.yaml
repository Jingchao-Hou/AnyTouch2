train_val_split: ~
train_data_budget: 1.0
val_data_budget: 1.0
max_train_data: 1000000
sensor: gelsight

dataset:
  _target_: sparsh.tactile_ssl.data.vision_based_forces_slip_probes.VisionForceSlipDataset
  config:
    sensor: ${data.sensor}
    remove_bg: false
    out_format: "video" # ["video", "concat_ch_img"  "single_image"]
    num_frames: 4 # num frames in input (for video and concat_ch_img format)
    frame_stride: 2  # temporal stride between frames in input 

    path_dataset: ${paths.data_root}/gelsight-force/
    list_datasets: [
      "sphere/batch_1",
      "sphere/batch_2",
      "sphere/batch_3",
      "sphere/batch_4",
      "sharp/batch_1",
      "sharp/batch_2",
      # "flat/batch_2",
    ]
    list_datasets_test: [
      "flat/batch_1",
      "flat/batch_2",
      # "sharp/batch_2",
      # "sphere/batch_4",
    ]
    # list_datasets: [
    #       sphere/batch_1,
    #       sphere/batch_3,
    #       sphere/batch_4,
    #       sphere/batch_5,
    #       # sphere/batch_6,
    #   ]
    # list_datasets_test: [
    #       sphere/batch_6,
    #   ]
    look_in_folder: false

    slip_horizon: 0
    # max_abs_forceXYZ: [2.0, 2.89, 2.49] # N (if need to assign different values for each dataset, use sphere_max_abs_forceXYZ, sharp_max_abs_forceXYZ, hex_max_abs_forceXYZ)
    # max_abs_forceXYZ: [6.84, 9.87, 8.52]
    max_abs_forceXYZ: [2.0, 1.5, 2.0]
    max_delta_forceXYZ: [0.80, 0.80, 0.80] #N

    sphere_max_abs_forceXYZ: [2.0, 1.0, 2.0] # N
    sharp_max_abs_forceXYZ: [1.5, 1.5, 1.5] # N
    hex_max_abs_forceXYZ: [1.5, 1.0, 1.5] # N

    is_anytouch: true
    
    transforms:
      resize: [224, 224]

train_dataloader:
  batch_size: 100
  num_workers: 32
  drop_last: True
  pin_memory: True
  persistent_workers: False
  shuffle: True

val_dataloader:
  batch_size: 512
  num_workers: 16
  drop_last: False
  pin_memory: True
  persistent_workers: False
