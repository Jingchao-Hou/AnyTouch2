train_val_split: ~
train_data_budget: 1.0
val_data_budget: 1.0
max_train_data: 100000
sensor: digit

dataset:
  _target_: sparsh.tactile_ssl.data.vision_based_pose_probes.PoseDataset
  config:
    sensor: ${data.sensor}
    remove_bg: true
    out_format: "concat_ch_img" # ["video", "concat_ch_img"  "single_image"]
    num_frames: 2 # num frames in input (for video and concat_ch_img format)
    frame_stride: 6  # temporal stride between frames in input 

    path_dataset: ${paths.data_root}/digit-pose/
    path_bgs_fingers: ${paths.data_root}/digit-pose/bgs/ 
    
    list_datasets: [
      "train/sugar",
      "train/pringles",
    ]
    list_datasets_test: [
      'test/sugar',
      'test/pringles',
    ]
    look_in_folder: true

    # parameters for pose estimaiton task
    finger_type: ring #[index, middle, ring]
    rel_pose_t_window: 5
    bins_translation: [0.1, 0.5, 1.0, 2.0, 5.0]
    bins_rotation: [0.03, 0.20, 0.50, 1.00, 2.00]

    is_anytouch: false

    transforms:
      resize: [320, 240]

train_dataloader:
  batch_size: 100
  num_workers: 32
  drop_last: True
  pin_memory: True
  persistent_workers: False
  shuffle: True

val_dataloader:
  batch_size: 512
  num_workers: 16
  drop_last: True
  pin_memory: True
  persistent_workers: False